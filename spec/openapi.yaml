openapi: 3.1.0
info:
  title: "FieldOps API"
  description: |
    Machine-readable API specification for the FieldOps project.
    This file is the canonical source for API contracts.
    See also: spec/API_SPEC.md for human-readable documentation.
  version: 0.1.0
  license:
    name: MIT
    identifier: MIT
  contact:
    name: "FieldOps Dev Team"

servers:
  - url: /api/v1
    description: API v1 (default)
  - url: http://localhost:8080/api/v1
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Health check endpoints
  - name: WorkOrders
    description: Work order management endpoints
  - name: Synchronization
    description: Offline payload synchronization endpoints

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns the API health status. No authentication required.
      tags: [Health]
      security: []  # Public endpoint
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                required: [status, timestamp]
        "500":
          $ref: "#/components/responses/InternalError"

  /work-orders:
    get:
      operationId: listWorkOrders
      summary: List assigned work orders
      description: Returns a list of work orders assigned to the authenticated technician.
      tags: [WorkOrders]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, in_progress, completed]
          description: Filter work orders by status
      responses:
        "200":
          description: List of work orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkOrder"
                required: [data]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /work-orders/{id}:
    get:
      operationId: getWorkOrder
      summary: Get work order by ID
      description: Returns detailed metadata for a single work order.
      tags: [WorkOrders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique work order identifier
      responses:
        "200":
          description: Work order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /sync:
    post:
      operationId: syncInspection
      summary: Synchronize offline inspection payload
      description: Uploads offline collected inspection steps, metadata, and files.
      tags: [Synchronization]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                payload:
                  type: string
                  description: Stringified JSON containing the inspection steps and metadata.
                  example: '{"id":"ea32e8fc-f8a4-44cf-a3bc-a4f7e256a001","work_order_id":"7a3b3780-e83c-41c3-8f0a-115f5d888201","technician_id":"tech-01","gps_lat":40.416775,"gps_lon":-3.70379,"steps":[{"step_id":"site-overview","evidence_type":"photo","ocr_value":null,"optical_power_dbm":null,"quality_blur":"pass","quality_exposure":"pass","quality_framing":"pass"}]}'
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Array of evidence files corresponding to steps.
              required: [payload]
      responses:
        "200":
          description: Inspection successfully synchronized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the authentication endpoint

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination

    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of items per page

  schemas:
    ErrorResponse:
      type: object
      description: Standard error response format (matches API_SPEC.md)
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error message
              example: Invalid input provided
            details:
              type: object
              description: Additional error context
              additionalProperties: true
          required: [code, message]
      required: [error]

    WorkOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        address:
          type: string
          example: "Calle Principal 123, Madrid"
        ont_model:
          type: string
          example: "HG8145V5"
        expected_mac_prefix:
          type: string
          example: "48:8F:4C"
        assigned_technician_id:
          type: string
          example: "tech-01"
        status:
          type: string
          enum: [pending, in_progress, completed]
      required: [id, created_at, updated_at, address, ont_model, expected_mac_prefix, assigned_technician_id, status]

    SyncResponse:
      type: object
      properties:
        status:
          type: string
          example: "synced"
        inspection_id:
          type: string
          format: uuid
        verdict:
          type: string
          enum: [approved, rejected, review_required]
        details:
          type: string
          example: "All quality and compliance gates passed successfully."
      required: [status, inspection_id, verdict, details]

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: Invalid input provided
              details: {}

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: Missing or invalid authentication token
              details: {}

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: Insufficient permissions for this resource
              details: {}

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: The requested resource was not found
              details: {}

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: CONFLICT
              message: Resource already exists or conflicts with current state
              details: {}

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: RATE_LIMITED
              message: Too many requests, please try again later
              details: {}

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_ERROR
              message: An unexpected error occurred
              details: {}
